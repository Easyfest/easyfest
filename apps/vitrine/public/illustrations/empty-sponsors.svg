<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Aucun sponsor">
  <!-- Boîte cadeau ouverte -->
  <g transform="translate(140,90)">
    <!-- Couvercle -->
    <rect x="10" y="-15" width="100" height="20" rx="3" fill="#FF5E5B"/>
    <rect x="55" y="-30" width="10" height="35" fill="#F4B860"/>
    <ellipse cx="60" cy="-30" rx="15" ry="8" fill="#F4B860"/>
    <ellipse cx="60" cy="-30" rx="6" ry="5" fill="#FFF8F0"/>
    <!-- Boîte -->
    <rect x="0" y="10" width="120" height="80" rx="3" fill="#FFF8F0" stroke="#FF5E5B" stroke-width="2"/>
    <line x1="60" y1="10" x2="60" y2="90" stroke="#F4B860" stroke-width="3"/>
  </g>
  <!-- Étoiles flottantes -->
  <g fill="#F4B860" opacity="0.6">
    <circle cx="80" cy="100" r="3"/>
    <circle cx="320" cy="120" r="4"/>
    <circle cx="100" cy="200" r="2"/>
    <circle cx="310" cy="210" r="3"/>
  </g>
  <text x="200" y="240" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1A1A1A" opacity="0.6">Pas encore de sponsors</text>
  <text x="200" y="260" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#1A1A1A" opacity="0.4">Click "Ajouter" pour démarrer ton CRM</text>
</svg>
