<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Planning vide">
  <defs>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#FFE8DA"/>
    </linearGradient>
  </defs>
  <!-- Cards qui flottent avec rotation -->
  <g transform="translate(70,80) rotate(-8)">
    <rect width="80" height="100" rx="10" fill="url(#card1)" stroke="#FF5E5B" stroke-width="2"/>
    <circle cx="40" cy="35" r="14" fill="#FF5E5B" opacity="0.3"/>
    <line x1="20" y1="60" x2="60" y2="60" stroke="#FF5E5B" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="72" x2="50" y2="72" stroke="#FF5E5B" stroke-width="2" opacity="0.3"/>
  </g>
  <g transform="translate(165,60) rotate(3)">
    <rect width="80" height="100" rx="10" fill="url(#card1)" stroke="#F4B860" stroke-width="2"/>
    <circle cx="40" cy="35" r="14" fill="#F4B860" opacity="0.4"/>
    <line x1="20" y1="60" x2="60" y2="60" stroke="#F4B860" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="72" x2="50" y2="72" stroke="#F4B860" stroke-width="2" opacity="0.3"/>
  </g>
  <g transform="translate(260,90) rotate(-4)">
    <rect width="80" height="100" rx="10" fill="url(#card1)" stroke="#FF5E5B" stroke-width="2"/>
    <circle cx="40" cy="35" r="14" fill="#FF5E5B" opacity="0.3"/>
    <line x1="20" y1="60" x2="60" y2="60" stroke="#FF5E5B" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="72" x2="50" y2="72" stroke="#FF5E5B" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Flèche en pointillé "déposer ici" -->
  <path d="M 200 220 Q 200 250 200 270" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="4 4" opacity="0.3" fill="none"/>
  <polygon points="195,265 205,265 200,275" fill="#1A1A1A" opacity="0.3"/>
  <text x="200" y="290" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" opacity="0.4">Glisse tes bénévoles ici</text>
</svg>
