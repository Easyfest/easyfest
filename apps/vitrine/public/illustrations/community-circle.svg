<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Communauté">
  <!-- Feu central -->
  <g transform="translate(200,180)">
    <ellipse cx="0" cy="20" rx="22" ry="6" fill="#1A1A1A" opacity="0.2"/>
    <path d="M 0 -15 Q -10 0 -8 12 Q -5 16 0 16 Q 5 16 8 12 Q 10 0 0 -15 Z" fill="#FF5E5B"/>
    <path d="M 0 -8 Q -5 0 -4 8 Q -2 11 0 11 Q 2 11 4 8 Q 5 0 0 -8 Z" fill="#F4B860"/>
  </g>
  <!-- Personnages autour (5 cercles) -->
  <g>
    <!-- gauche -->
    <g transform="translate(80,170)">
      <circle cx="0" cy="0" r="14" fill="#FF5E5B" opacity="0.7"/>
      <rect x="-12" y="14" width="24" height="32" rx="6" fill="#FF5E5B" opacity="0.5"/>
    </g>
    <!-- haut-gauche -->
    <g transform="translate(130,90)">
      <circle cx="0" cy="0" r="14" fill="#F4B860" opacity="0.7"/>
      <rect x="-12" y="14" width="24" height="32" rx="6" fill="#F4B860" opacity="0.5"/>
    </g>
    <!-- haut -->
    <g transform="translate(200,75)">
      <circle cx="0" cy="0" r="14" fill="#FF5E5B" opacity="0.7"/>
      <rect x="-12" y="14" width="24" height="32" rx="6" fill="#FF5E5B" opacity="0.5"/>
    </g>
    <!-- haut-droit -->
    <g transform="translate(270,90)">
      <circle cx="0" cy="0" r="14" fill="#F4B860" opacity="0.7"/>
      <rect x="-12" y="14" width="24" height="32" rx="6" fill="#F4B860" opacity="0.5"/>
    </g>
    <!-- droit -->
    <g transform="translate(320,170)">
      <circle cx="0" cy="0" r="14" fill="#FF5E5B" opacity="0.7"/>
      <rect x="-12" y="14" width="24" height="32" rx="6" fill="#FF5E5B" opacity="0.5"/>
    </g>
  </g>
  <text x="200" y="270" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#1A1A1A" opacity="0.7">Rejoins notre communauté</text>
</svg>
