<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Mail envoyé">
  <!-- Trace en arc -->
  <path d="M 80 220 Q 200 80 320 180" stroke="#FF5E5B" stroke-width="2" stroke-dasharray="6 4" fill="none" opacity="0.5"/>
  <!-- Enveloppe arrivée -->
  <g transform="translate(290,150)">
    <rect width="60" height="40" rx="3" fill="#FF5E5B"/>
    <path d="M 0 0 L 30 25 L 60 0" stroke="#FFF8F0" stroke-width="2" fill="none"/>
    <!-- Cœur sortant -->
    <path d="M 30 -5 L 25 -10 L 27 -15 L 30 -12 L 33 -15 L 35 -10 Z" fill="#F4B860" transform="translate(0,-5)"/>
  </g>
  <!-- Bonhomme qui regarde -->
  <g transform="translate(50,180)">
    <circle cx="20" cy="0" r="14" fill="#FF5E5B" opacity="0.2"/>
    <circle cx="20" cy="0" r="10" fill="#FF5E5B" opacity="0.5"/>
    <rect x="10" y="14" width="20" height="30" rx="6" fill="#FF5E5B" opacity="0.4"/>
  </g>
  <text x="200" y="270" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1A1A1A" opacity="0.7">Mail bien envoyé</text>
</svg>
