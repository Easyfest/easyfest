<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Plan festival">
  <!-- Sol arrondi -->
  <path d="M 30 220 Q 200 180 370 220 L 370 280 L 30 280 Z" fill="#F4B860" opacity="0.2"/>
  <path d="M 30 240 Q 200 210 370 240" stroke="#1A1A1A" stroke-width="1" stroke-dasharray="3 3" fill="none" opacity="0.2"/>
  <!-- Scène (rectangle avec triangles) -->
  <g transform="translate(160,100)">
    <rect width="80" height="50" rx="6" fill="#FF5E5B"/>
    <polygon points="10,10 25,30 10,50 25,30" fill="#FFF8F0" opacity="0.7"/>
    <polygon points="55,10 70,30 55,50 70,30" fill="#FFF8F0" opacity="0.7"/>
    <text x="40" y="35" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" font-weight="700" fill="#FFF8F0">SCÈNE</text>
  </g>
  <!-- Tentes camping -->
  <g transform="translate(60,130)">
    <polygon points="0,30 15,5 30,30" fill="#F4B860" opacity="0.7"/>
    <polygon points="35,30 50,5 65,30" fill="#FF5E5B" opacity="0.7"/>
  </g>
  <!-- Bar (avec icône bière) -->
  <g transform="translate(290,140)">
    <rect width="50" height="35" rx="5" fill="#1A1A1A" opacity="0.7"/>
    <text x="25" y="22" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#FFF8F0">BAR</text>
  </g>
  <!-- Marqueurs ronds -->
  <g>
    <circle cx="100" cy="200" r="8" fill="#FF5E5B"/><text x="100" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF8F0">1</text>
    <circle cx="200" cy="200" r="8" fill="#F4B860"/><text x="200" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF8F0">2</text>
    <circle cx="300" cy="200" r="8" fill="#FF5E5B"/><text x="300" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF8F0">3</text>
  </g>
</svg>
